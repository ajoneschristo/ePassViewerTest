<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ePass MCL Coalnet Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  /* Light theme (default) */
  --bg:       #f0f2f5;
  --surface:  #ffffff;
  --raise:    #f7f8fa;
  --edge:     #dde3ec;
  --line:     #c8d2e0;
  --amber:    #d4860a;
  --amber-lo: #fff3d6;
  --green:    #1a9e5c;
  --green-lo: #e6f7ef;
  --red:      #c0392b;
  --blue:     #1a6fc4;
  --dim:      #7a8fa8;
  --mid:      #4a6080;
  --text:     #1a2436;
  --mono:     'IBM Plex Mono', monospace;
  --sans:     'IBM Plex Sans', sans-serif;
}
body.dark {
  --bg:       #0e1117;
  --surface:  #161b24;
  --raise:    #1c2333;
  --edge:     #253047;
  --line:     #2e3d56;
  --amber:    #f0a500;
  --amber-lo: #3a2800;
  --green:    #2fc97e;
  --green-lo: #0d2e1e;
  --red:      #e05454;
  --blue:     #4a9eff;
  --dim:      #5a7299;
  --mid:      #8ba3c2;
  --text:     #dde6f4;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100svh;
  -webkit-font-smoothing: antialiased;
  transition: background .2s, color .2s;
  overscroll-behavior-y: auto;
}

/* ── THEME TOGGLE ── */
.theme-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.theme-toggle-label {
  font-size: 10px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .6px;
  user-select: none;
}
.toggle-track {
  width: 36px; height: 20px;
  background: var(--line);
  border-radius: 10px;
  position: relative;
  transition: background .2s;
  flex-shrink: 0;
}
.toggle-track.on { background: var(--amber); }
.toggle-thumb {
  position: absolute;
  width: 14px; height: 14px;
  background: #fff;
  border-radius: 50%;
  top: 3px; left: 3px;
  transition: left .18s;
  box-shadow: 0 1px 3px rgba(0,0,0,.3);
}
.toggle-track.on .toggle-thumb { left: 19px; }

/* ── HEADER — shown only on drop screen ── */
.app-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--edge);
}
.app-header.hidden { display: none; }
.mcl-badge {
  width: 32px; height: 32px;
  background: var(--amber);
  color: #fff;
  font-family: var(--mono);
  font-weight: 600;
  font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  letter-spacing: .5px;
  flex-shrink: 0;
  clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
}
.app-name { flex: 1; min-width: 0; }
.app-name h1 {
  font-size: 14px; font-weight: 600; color: var(--text);
  letter-spacing: .3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.app-name p {
  font-size: 10px; color: var(--dim); letter-spacing: .5px;
  text-transform: uppercase; margin-top: 1px;
}
.header-date {
  font-family: var(--mono); font-size: 11px; color: var(--amber);
  text-align: right; letter-spacing: .5px; flex-shrink: 0;
  max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.header-date span { display: block; color: var(--dim); font-size: 10px; margin-top: 1px; }

/* ── EMBEDDED THEME TOGGLE (in report-meta row) ── */
.theme-icon-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--raise);
  border: 1px solid var(--line);
  padding: 6px 10px;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: border-color .15s;
}
.theme-icon-btn:active { border-color: var(--amber); }
.theme-icon-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

/* ── UPLOAD ZONE ── */
#drop-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100svh - 69px);
  padding: 32px 20px;
  gap: 24px;
}
.drop-box {
  width: 100%;
  max-width: 400px;
  border: 1.5px dashed var(--line);
  padding: 44px 32px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
}
.drop-box:hover, .drop-box.over {
  border-color: var(--amber);
  background: var(--amber-lo);
}
.drop-icon {
  font-size: 40px;
  margin-bottom: 14px;
  display: block;
}
.drop-box h2 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}
.drop-box p {
  font-size: 13px;
  color: var(--dim);
}
.drop-tags {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 16px;
  flex-wrap: wrap;
}
.tag {
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 9px;
  border: 1px solid var(--line);
  color: var(--mid);
  letter-spacing: .4px;
}
.privacy-note {
  font-size: 11px;
  color: var(--edge);
  letter-spacing: .3px;
}

/* ── MAIN DASHBOARD ── */
#dashboard {
  display: none;
  padding: 10px 10px calc(env(safe-area-inset-bottom, 0px) + 20px) 8px;
  max-width: 600px;
  margin: 0 auto;
}

/* ── REPORT META ── */
.report-meta {
  background: var(--surface);
  border: 1px solid var(--edge);
  padding: 12px 14px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.meta-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 3px; }
.meta-val   { font-family: var(--mono); font-size: 13px; color: var(--text); }
.open-new-btn {
  display: flex; align-items: center; gap: 5px;
  background: none;
  border: 1px solid var(--line);
  color: var(--mid);
  font-family: var(--sans);
  font-size: 12px;
  padding: 7px 10px;
  cursor: pointer;
  flex-shrink: 0;
  transition: border-color .15s, color .15s;
  -webkit-tap-highlight-color: transparent;
}
.open-new-btn:hover { border-color: var(--amber); color: var(--amber); }
.open-new-btn svg { width:13px; height:13px; }

/* ── TIME FILTER CARD ── */
.time-card {
  background: var(--surface);
  border: 1px solid var(--edge);
  padding: 12px 14px;
  margin-bottom: 12px;
}
.time-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.section-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .8px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.section-label svg { width:13px; height:13px; color:var(--amber); }
.time-clear {
  background: none; border: none;
  font-size: 11px; color: var(--dim);
  cursor: pointer; letter-spacing: .4px;
  text-decoration: underline;
  text-underline-offset: 3px;
  padding: 4px 0;
  -webkit-tap-highlight-color: transparent;
}
.time-clear:hover { color: var(--red); }

.time-display-row {
  display: flex;
  align-items: stretch;
}
.time-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--raise);
  border: 1px solid var(--line);
  padding: 12px 16px;
  cursor: pointer;
  flex: 1;
  min-width: 0;
  transition: border-color .15s;
  -webkit-tap-highlight-color: transparent;
}
.time-pill:active { border-color: var(--amber); }
.time-pill-val {
  font-family: var(--mono);
  font-size: 22px;
  color: var(--amber);
  letter-spacing: 1px;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.time-pill-val.allday { color: var(--dim); font-size: 16px; }
.time-pill svg { width:18px; height:18px; color:var(--dim); flex-shrink:0; }

/* ── STATS GRID — removed, replaced by inline info bar ── */

/* "Data as of" inline bar above area table */
.asof-bar {
  background: var(--surface);
  border: 1px solid var(--edge);
  border-top: 3px solid var(--blue);
  border-bottom: none;
  padding: 10px 12px;
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-wrap: wrap;
}
.asof-bar-time {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 600;
  color: var(--blue);
  letter-spacing: .5px;
  line-height: 1;
}
.asof-bar-time.warn { color: var(--red); }
.asof-bar-date {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--mid);
}
.asof-bar-warn {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--red);
  width: 100%;
  margin-top: 2px;
}
.asof-bar-label {
  font-size: 10px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .7px;
  margin-right: 2px;
}

/* Cross-check pill — kept for internal verification */
.crosscheck {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 7px;
  border: 1px solid;
  letter-spacing: .3px;
}
.crosscheck.ok   { color: var(--green); border-color: var(--green); background: var(--green-lo); }
.crosscheck.warn { color: var(--red);   border-color: var(--red);   background: rgba(192,57,43,.08); }

/* ── CLOCK PICKER MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.72);
  z-index: 3000;
  display: none;
  align-items: flex-end;        /* sheet slides up from bottom on mobile */
  justify-content: center;
}
.modal-backdrop.open { display: flex; }

.clock-sheet {
  background: var(--surface);
  border: 1px solid var(--edge);
  border-bottom: none;
  width: 100%;
  max-width: 420px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  animation: slideUp .22s ease;
}
@keyframes slideUp { from { transform: translateY(100%); opacity:0; } to { transform: translateY(0); opacity:1; } }

.sheet-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 14px;
  border-bottom: 1px solid var(--edge);
}
.sheet-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--mid);
  text-transform: uppercase;
  letter-spacing: .8px;
}
.sheet-close {
  background: none; border: none;
  color: var(--dim); font-size: 20px;
  cursor: pointer; line-height: 1;
  padding: 0 2px;
}
.sheet-close:hover { color: var(--text); }

/* ── DIGITAL TIME DISPLAY inside sheet ── */
.clock-time-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 20px 20px 0;
}
.clock-seg {
  font-family: var(--mono);
  font-size: 58px;
  font-weight: 600;
  background: var(--raise);
  border: 2px solid var(--line);
  padding: 8px 16px;
  line-height: 1;
  cursor: pointer;
  color: var(--dim);
  transition: border-color .15s, color .15s;
  min-width: 96px;
  text-align: center;
  user-select: none;
}
.clock-seg.active {
  border-color: var(--amber);
  color: var(--amber);
}
.clock-colon {
  font-family: var(--mono);
  font-size: 50px;
  font-weight: 600;
  color: var(--dim);
  line-height: 1;
  margin-bottom: 4px;
}
.ampm-toggle {
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-self: center;
}
.ampm-btn {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  padding: 8px 12px;
  background: var(--raise);
  border: 2px solid var(--line);
  color: var(--dim);
  cursor: pointer;
  letter-spacing: .5px;
  transition: all .15s;
}
.ampm-btn.active {
  background: var(--amber-lo);
  border-color: var(--amber);
  color: var(--amber);
}

/* ── ANALOG CLOCK FACE ── */
.clock-face-wrap {
  display: flex;
  justify-content: center;
  padding: 14px 20px 8px;
}
.clock-face {
  width: min(320px, 88vw);
  height: min(320px, 88vw);
  position: relative;
  border-radius: 50%;
  background: var(--raise);
  border: 3px solid var(--line);
  touch-action: none;
  cursor: pointer;
  flex-shrink: 0;
}
/* Clock tick marks */
.clock-face::before {
  content: '';
  position: absolute; inset: 8px;
  border-radius: 50%;
  border: 1px solid var(--edge);
}
/* Center dot */
.clock-face::after {
  content: '';
  position: absolute;
  width: 10px; height: 10px;
  background: var(--amber);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 3;
}
.clock-hand {
  position: absolute;
  bottom: 50%; left: 50%;
  transform-origin: bottom center;
  border-radius: 4px 4px 0 0;
  z-index: 2;
  pointer-events: none;
}
.clock-hand.hour-hand {
  width: 5px;
  height: 28%;
  background: var(--amber);
  margin-left: -2.5px;
}
.clock-hand.minute-hand {
  width: 3px;
  height: 38%;
  background: var(--mid);
  margin-left: -1.5px;
}
.clock-hand.select-hand {
  width: 3px;
  height: 44%;
  background: var(--amber);
  margin-left: -1.5px;
  opacity: .9;
}
.clock-number {
  position: absolute;
  font-family: var(--mono);
  font-size: clamp(18px, 5.5vw, 24px);
  font-weight: 700;
  color: var(--mid);
  transform: translate(-50%, -50%);
  z-index: 2;
  pointer-events: none;
  user-select: none;
  transition: color .1s;
}
.clock-number.hi { color: var(--amber); font-weight: 700; }
.clock-select-dot {
  position: absolute;
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--amber);
  transform: translate(-50%, -50%);
  z-index: 3;
  pointer-events: none;
}

/* minute mode small numbers ring label */
.clock-mode-label {
  text-align: center;
  font-size: 10px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-bottom: 6px;
  font-family: var(--mono);
}

/* ── SHEET FOOTER ── */
/* ── SETTINGS MODAL ──────────────────────────────── */
/* ── Custom Time Picker ─────────────────────────── */
.stt-time-btn {
  width: 100%; padding: 6px 10px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 8px; cursor: pointer;
  font-family: var(--mono); font-size: 13px; color: var(--text);
  text-align: left; transition: border-color .15s;
}
.stt-time-btn:hover { border-color: var(--amber); }
.stt-time-picker {
  position: relative; display: inline-flex;
  align-items: center; gap: 6px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
  font-family: var(--mono); font-size: 13px;
  color: var(--text); user-select: none;
  width: 100%; box-sizing: border-box;
}
.stt-time-picker:hover { border-color: var(--mid); }
.stt-time-picker.open { border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-lo); }
.stt-time-picker-val { flex: 1; letter-spacing: .5px; }
.stt-time-picker-icon { color: var(--border); font-size: 10px; flex-shrink: 0; }
.stt-clock-popup {
  display: none; position: fixed;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 16px; box-shadow: 0 16px 48px rgba(0,0,0,.28);
  z-index: 10000; padding: 16px; width: 248px;
}
.stt-time-picker.open .stt-clock-popup { display: block; }
.stt-clock-header {
  display: flex; align-items: center;
  gap: 8px; margin-bottom: 10px;
}
.stt-clock-display {
  font-family: var(--mono); font-size: 28px; font-weight: 700;
  color: var(--text); letter-spacing: 1px; flex: 1;
}
.stt-clock-display span.active { color: var(--amber); }
.stt-clock-ampm { display: flex; flex-direction: column; gap: 4px; }
.stt-ampm-btn {
  background: none; border: 1.5px solid var(--border);
  border-radius: 6px; font-size: 10px; font-weight: 700;
  padding: 4px 7px; cursor: pointer; color: var(--dim);
  transition: all .12s; letter-spacing: .5px;
}
.stt-ampm-btn.active { background: var(--amber); border-color: var(--amber); color: #fff; }
.stt-clock-svg { display: block; margin: 0 auto; cursor: crosshair; }
.stt-clock-face { fill: var(--bg); stroke: var(--border); stroke-width: 1.5; }
.stt-clock-center { fill: var(--amber); }
.stt-clock-hand-h { stroke: var(--text); stroke-width: 3.5; stroke-linecap: round; }
.stt-clock-hand-m { stroke: var(--amber); stroke-width: 2.5; stroke-linecap: round; }
.stt-clock-tick { stroke: var(--border); stroke-width: 1; }
.stt-clock-tick.major { stroke: var(--dim); stroke-width: 1.5; }
.stt-clock-num { font-size: 9px; fill: var(--dim); text-anchor: middle; dominant-baseline: central; font-family: var(--mono); font-weight: 600; }
.stt-clock-mode { display: flex; gap: 4px; margin-top: 8px; justify-content: center; }
.stt-clock-mode-btn {
  font-size: 10px; font-weight: 700; letter-spacing: .5px;
  padding: 3px 12px; border-radius: 5px; cursor: pointer;
  border: 1.5px solid var(--border); color: var(--dim); background: none;
  transition: all .12s;
}
.stt-clock-mode-btn.active { border-color: var(--amber); color: var(--amber); background: var(--amber-lo); }
.stt-clock-ok {
  margin-top: 8px; width: 100%; padding: 7px;
  background: var(--green); color: #fff; border: none;
  border-radius: 8px; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: opacity .15s;
}
.stt-clock-ok:active { opacity: .8; }

/* ═══════════════ SETTINGS MODAL ════════════════════ */
.stt-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(4px);
  z-index: 2000;
  overflow-y: auto;
  padding: 24px 16px;
  box-sizing: border-box;
  align-items: flex-start;
  justify-content: center;
}
.stt-panel {
  background: var(--surface);
  margin: 0 auto;
  width: 100%;
  max-width: 1020px;
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 24px 80px rgba(0,0,0,.25);
  overflow: hidden;
  font-family: 'IBM Plex Sans', sans-serif;
}
.stt-header {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 18px 24px 16px;
  border-bottom: 1px solid var(--border);
}
.stt-title {
  font-size: 15px; font-weight: 700;
  color: var(--text); letter-spacing: .2px;
}
.stt-title-sub {
  font-size: 11px; color: var(--dim);
  font-weight: 400; margin-top: 1px;
}
.stt-close {
  background: none; border: none; cursor: pointer;
  color: var(--dim); font-size: 20px; line-height: 1;
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s;
}
.stt-close:hover { background: var(--bg); color: var(--text); }
.stt-body {
  padding: 24px;
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 0 32px;
}
.stt-col-full { grid-column: 1 / -1; }
.stt-section { margin-bottom: 20px; }
.stt-section:last-child { margin-bottom: 0; }
.stt-label {
  display: block;
  font-size: 11px; font-weight: 700;
  color: var(--mid); text-transform: uppercase;
  letter-spacing: .8px; margin-bottom: 6px;
}
.stt-input {
  width: 100%; box-sizing: border-box;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  font-family: 'IBM Plex Sans', sans-serif;
  transition: border-color .15s, box-shadow .15s;
  outline: none;
}
.stt-input:focus {
  border-color: var(--amber);
  box-shadow: 0 0 0 3px var(--amber-lo);
}
.stt-section-hdr {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
